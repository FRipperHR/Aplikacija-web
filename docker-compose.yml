version: '3.8'

services:
  webpage_apartman:
    build: .
    container_name: webpage_apartman
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
